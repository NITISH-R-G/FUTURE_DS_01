name: Repository Automation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * *' # Daily at 2am
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-document:
    name: Auto Document and Analyze
    runs-on: ubuntu-latest

    # Do not run if the commit message contains [skip auto] to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip auto]')"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Need full history for some analysis
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f scripts/automation/requirements.txt ]; then pip install -r scripts/automation/requirements.txt; fi

    - name: Analyze Repository
      run: python scripts/automation/analyze_repository.py

    - name: Build Knowledge Graph
      run: python scripts/automation/knowledge_graph.py

    - name: Generate Interactive Diagrams
      run: python scripts/automation/generate_diagrams.py

    - name: Update README
      run: python scripts/automation/update_readme.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          git fetch origin ${{ github.head_ref }}
          git checkout ${{ github.head_ref }}
        fi

        git add repo_state.json knowledge_graph.json docs/diagrams/ README.md || true
        # Only commit if there are changes
        if ! git diff-index --quiet HEAD --; then
          git commit -m "docs: auto-update repository state and diagrams [skip auto]"

          # Retry pushing with a rebase loop to avoid remote rejection
          for i in {1..5}; do
            git pull --rebase origin ${{ github.head_ref || github.ref_name }} && git push && break
            sleep $((i * 5))
          done
        else
          echo "No changes to commit"
        fi
